<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulador de Desmatamento</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header>
    <h1>🌳 Simulador de Desmatamento</h1>
    <p>Veja como o desmatamento afeta o planeta ao longo do tempo.</p>
  </header>

  <main>

    <section class="controls">
      <h2>Selecione o Ano</h2>

      <input
        type="range"
        min="2020"
        max="2100"
        value="2020"
        id="yearSlider"
      >

      <div class="year-box">
        Ano: <span id="yearValue">2020</span>
      </div>
    </section>

    <section class="simulation">

      <div class="forest-container" id="forest">

        <!-- árvores -->
        <div class="tree">🌳</div>
        <div class="tree">🌳</div>
        <div class="tree">🌳</div>
        <div class="tree">🌳</div>
        <div class="tree">🌳</div>
        <div class="tree">🌳</div>
        <div class="tree">🌳</div>
        <div class="tree">🌳</div>
        <div class="tree">🌳</div>
        <div class="tree">🌳</div>
        <div class="tree">🌳</div>
        <div class="tree">🌳</div>

      </div>

    </section>

    <section class="stats">

      <div class="card">
        <h3>🌎 CO₂ na Atmosfera</h3>
        <p id="co2">350 ppm</p>
      </div>

      <div class="card">
        <h3>🌡 Temperatura Média</h3>
        <p id="temp">1.0°C</p>
      </div>

      <div class="card">
        <h3>🐾 Biodiversidade</h3>
        <p id="bio">100%</p>
      </div>

    </section>

    <section class="chart-section">
      <canvas id="desmatamentoChart"></canvas>
    </section>

  </main>

  <footer>
    <p>Projeto educativo sobre impactos ambientais 🌱</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
