<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rede Social Verde</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <aside class="sidebar">
    <div class="logo">
      🌱 GreenConnect
    </div>

    <nav>
      <button class="nav-btn active">🏠 Início</button>
      <button class="nav-btn">🌎 Explorar</button>
      <button class="nav-btn">🏆 Desafios</button>
      <button class="nav-btn">👤 Perfil</button>
    </nav>

    <div class="eco-card">
      <h3>Desafio do Dia</h3>
      <p>Fique 1 dia sem plástico descartável.</p>
      <button>Participar</button>
    </div>
  </aside>

  <main>

    <section class="create-post">
      <textarea id="postInput" placeholder="Compartilhe uma ação sustentável..."></textarea>
</html>
